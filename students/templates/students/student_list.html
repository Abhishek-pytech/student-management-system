{% extends 'students/base.html' %}

{% block content %}

<h2>Student List</h2>

<form method="GET" class="mb-3">

<input type="text" name="q" class="form-control" placeholder="Search student">

</form>

<table class="table table-striped">

<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Course</th>
<th>Age</th>
<th>Actions</th>
</tr>

{% for student in students %}

<tr>
<td>{{ student.name }}</td>
<td>{{ student.email }}</td>
<td>{{ student.phone }}</td>
<td>{{ student.course }}</td>
<td>{{ student.age }}</td>

<td>
<a class="btn btn-warning btn-sm" href="/edit/{{ student.id }}">Edit</a>
<a class="btn btn-danger btn-sm" href="/delete/{{ student.id }}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
